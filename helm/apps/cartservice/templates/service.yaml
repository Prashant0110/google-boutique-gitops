apiVersion: v1
kind: Service

metadata:
  name: cartservice

  labels:
    app: cartservice
    component: backend
    service: cartservice

spec:
  type: {{ .Values.service.type }}

  selector:
    app: cartservice

  ports:
    - name: grpc

      port: {{ .Values.service.port }}

      targetPort: {{ .Values.service.targetPort }}

      protocol: TCP
