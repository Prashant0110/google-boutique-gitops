apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: redis-cart

  labels:
    app: redis-cart
    component: cache
    service: redis-cart

spec:
  serviceName: redis-cart

  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: redis-cart

  template:
    metadata:
      labels:
        app: redis-cart
        component: cache
        service: redis-cart

    spec:
      containers:
        - name: redis-cart

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.targetPort }}

              name: redis

              protocol: TCP

          volumeMounts:
            - name: redis-data

              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: redis-data

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: {{ .Values.persistence.storageClass }}

        resources:
          requests:
            storage: {{ .Values.persistence.size }}
