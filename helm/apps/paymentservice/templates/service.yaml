apiVersion: v1
kind: Service

metadata:
  name: paymentservice

  labels:
    app: paymentservice
    component: backend
    service: paymentservice

spec:
  type: {{ .Values.service.type }}

  selector:
    app: paymentservice

  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
