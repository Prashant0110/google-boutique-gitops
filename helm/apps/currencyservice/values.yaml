replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/currencyservice
  tag: v0.10.2
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 7000
  targetPort: 7000

containerEnvVars:
  - name: PORT
    value: "7000"

  - name: DISABLE_PROFILER
    value: "1"
