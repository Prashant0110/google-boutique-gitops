apiVersion: v1
kind: Service

metadata:
  name: currencyservice

  labels:
    app: currencyservice
    component: backend
    service: currencyservice

spec:
  type: {{ .Values.service.type }}

  selector:
    app: currencyservice

  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
