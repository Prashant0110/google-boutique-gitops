apiVersion: v1
kind: Service

metadata:
  name: productcatalogservice

  labels:
    app: productcatalogservice
    component: backend
    service: productcatalogservice

spec:
  type: {{ .Values.service.type }}

  selector:
    app: productcatalogservice

  ports:
    - name: grpc

      port: {{ .Values.service.port }}

      targetPort: {{ .Values.service.targetPort }}

      protocol: TCP
