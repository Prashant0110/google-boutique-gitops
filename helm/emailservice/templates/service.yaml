apiVersion: v1
kind: Service

metadata:
  name: {{ include "emailservice.fullname" . }}

  labels:
    app: {{ include "emailservice.name" . }}
    component: backend
    service: emailservice

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ include "emailservice.name" . }}

  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
