apiVersion: v1
kind: Service

metadata:
  name: checkoutservice

  labels:
    app: checkoutservice
    component: backend
    service: checkoutservice

spec:
  type: {{ .Values.service.type }}

  selector:
    app: checkoutservice

  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
