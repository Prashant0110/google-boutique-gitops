replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice
  tag: v0.10.2
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 7070
  targetPort: 7070

containerEnvVars:
  - name: REDIS_ADDR
    value: "redis-cart:6379"

  - name: PORT
    value: "7070"
